<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard – SastoBazaar</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; background: #f5f7f5; }
  nav { background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; height: 65px; display: flex; align-items: center; gap: 1.5rem; }
  .logo { font-size: 1.4rem; font-weight: 800; color: #1a1a1a; text-decoration: none; display: flex; align-items: center; gap: 0.4rem; }
  .logo i { color: #2e7d32; }
  .logo span { color: #2e7d32; }
  .search-wrap { flex: 1; display: flex; max-width: 420px; }
  .search-wrap input { flex: 1; padding: 0.5rem 0.9rem; border: 1.5px solid #ddd; border-right: none; border-radius: 8px 0 0 8px; font-size: 0.9rem; outline: none; }
  .search-wrap button { padding: 0.5rem 0.9rem; background: #2e7d32; color: #fff; border: none; border-radius: 0 8px 8px 0; cursor: pointer; }
  .nav-links { list-style: none; display: flex; align-items: center; gap: 0.2rem; margin-left: auto; }
  .nav-links a { padding: 0.5rem 0.8rem; color: #333; text-decoration: none; font-size: 0.92rem; border-radius: 6px; display: flex; align-items: center; gap: 0.4rem; }
  .nav-links a:hover { color: #2e7d32; background: #e8f5e9; }
 
  /* Banner */
  .banner { background: linear-gradient(135deg, #2e7d32, #43a047); padding: 2rem 0; }
  .banner-inner { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
  .welcome { display: flex; align-items: center; gap: 1rem; }
  .avatar { width: 55px; height: 55px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: #fff; }
  .welcome h1 { font-size: 1.4rem; font-weight: 700; color: #fff; margin-bottom: 0.2rem; }
  .welcome p { font-size: 0.9rem; color: rgba(255,255,255,0.85); }
  .logout-btn { padding: 0.55rem 1.2rem; background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.5); border-radius: 8px; color: #fff; font-size: 0.9rem; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
  .logout-btn:hover { background: rgba(255,255,255,0.28); }
 
  /* Content */
  .content { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem 3rem; }
  .section-title { font-size: 1.1rem; font-weight: 700; color: #1a1a1a; margin-bottom: 1rem; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); padding: 1.3rem 1.2rem; display: flex; align-items: center; gap: 1rem; }
  .card-icon { width: 50px; height: 50px; background: #e8f5e9; color: #2e7d32; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
  .card-num { font-size: 1.6rem; font-weight: 700; color: #1a1a1a; line-height: 1; }
  .card-label { font-size: 0.82rem; color: #777; margin-top: 0.2rem; }
  .actions { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 2rem; }
  .action-btn { padding: 0.65rem 1.4rem; background: #2e7d32; color: #fff; border-radius: 8px; font-size: 0.95rem; font-weight: 600; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
  .action-btn:hover { background: #1b5e20; }
  .action-btn.outline { background: #fff; color: #2e7d32; border: 1.5px solid #2e7d32; }
  .action-btn.outline:hover { background: #e8f5e9; }
</style>
</head>
<body>
 
<nav>
  <div class="nav-inner">
    <a href="Homepage.html" class="logo"><i class="fa-solid fa-bag-shopping"></i> Sasto<span>Bazaar</span></a>
    <div class="search-wrap">
      <input type="text" placeholder="Search products...">
      <button><i class="fa fa-search"></i></button>
    </div>
    <ul class="nav-links">
      <li><a href="Homepage.html"><i class="fa fa-house"></i> Home</a></li>
      <li><a href="aboutus.html"><i class="fa fa-circle-info"></i> About</a></li>
      <li><a href="#"><i class="fa fa-heart"></i> Wishlist</a></li>
      <li><a href="#"><i class="fa fa-cart-shopping"></i> Cart</a></li>
      <li><a href="login.html"><i class="fa fa-user"></i> Account</a></li>. 
    </ul>
  </div>
</nav>
 
<div class="banner">
  <div class="banner-inner">
    <div class="welcome">
      <div class="avatar"><i class="fa fa-user"></i></div>
      <div>
        <h1>Welcome back, <span id="username-display">User</span>! 👋</h1>
        <p>Glad to have you on SastoBazaar. Start buying or selling today.</p>
      </div>
    </div>
    <a href="Homepage.html" class="logout-btn" onclick="doLogout()">
      <i class="fa fa-right-from-bracket"></i> Logout
    </a>
  </div>
</div>
 
<div class="content">
  <p class="section-title">Your Overview</p>
  <div class="cards">
    <div class="card"><div class="card-icon"><i class="fa fa-cart-shopping"></i></div><div><div class="card-num">0</div><div class="card-label">Items in Cart</div></div></div>
    <div class="card"><div class="card-icon"><i class="fa fa-heart"></i></div><div><div class="card-num">0</div><div class="card-label">Saved Items</div></div></div>
    <div class="card"><div class="card-icon"><i class="fa fa-store"></i></div><div><div class="card-num">0</div><div class="card-label">My Listings</div></div></div>
    <div class="card"><div class="card-icon"><i class="fa fa-bag-shopping"></i></div><div><div class="card-num">0</div><div class="card-label">Orders</div></div></div>
  </div>
 
  <p class="section-title" style="margin-top:2rem;">Quick Actions</p>
  <div class="actions">
    <a href="#" class="action-btn"><i class="fa fa-plus"></i> Post an Item</a>
    <a href="#" class="action-btn outline"><i class="fa fa-compass"></i> Browse Products</a>
  </div>
</div>
 
<script>
  // Show the username saved from login
  const user = localStorage.getItem('sb_user') || 'User';
  document.getElementById('username-display').textContent = user;
 
  function doLogout() {
    localStorage.removeItem('sb_user');
  }
</script>
 
</body>
</html>
